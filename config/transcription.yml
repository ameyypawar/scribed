default: openai_compatible
providers:
  openai:
    class: Providers::Openai
    api_key_env: OPENAI_API_KEY
    model: whisper-1
  openai_compatible:
    class: Providers::OpenaiCompatible
    base_url: http://whisper:8000/v1
    api_key_env: WHISPER_API_KEY
    model: Systran/faster-whisper-small
  whisper_cpp:
    class: Providers::WhisperCpp
    model: base.en
  deepgram:
    class: Providers::Deepgram
    api_key_env: DEEPGRAM_API_KEY
    model: nova-3
diarizers:
  pyannote:
    class: Diarization::Pyannote
    api_key_env: PYANNOTE_API_KEY
    endpoint: https://api.pyannote.ai/v1/diarize
  whisperx:
    class: Diarization::WhisperX
    base_url: http://whisperx:8001
default_diarizer: pyannote
